# Nginx 反向代理配置
# 用于 HelloHebut 智能客服系统的生产部署

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # 上游服务器配置
    upstream hellohebut_backend {
        least_conn;
        server hellohebut:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # HTTP 服务器配置
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # 重定向到 HTTPS (生产环境)
        # return 301 https://$server_name$request_uri;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Python API：移除前端使用的 /api/python 前缀后转发给 FastAPI。
        location /api/python/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            rewrite ^/api/python/?(.*)$ /$1 break;
            proxy_pass http://hellohebut_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Vue 单页应用入口。
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 健康检查端点
        location /health {
            proxy_pass http://hellohebut_backend/health;
            access_log off;
        }

        # Prometheus 指标端点
        location /metrics {
            proxy_pass http://hellohebut_backend/metrics;
            # 限制访问
            allow 127.0.0.1;
            allow 172.28.0.0/16;  # Docker 网络
            deny all;
        }

        # Vite 构建产物使用内容哈希，可长期缓存。
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Swagger UI
        location /docs {
            proxy_pass http://hellohebut_backend/docs;
        }

        location /redoc {
            proxy_pass http://hellohebut_backend/redoc;
        }

        location /openapi.json {
            proxy_pass http://hellohebut_backend/openapi.json;
        }

    }

    # HTTPS 服务器配置 (生产环境)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL 证书配置
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # SSL 会话缓存
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS (可选)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # 其他配置与 HTTP 相同
    #     # ...
    # }
}
