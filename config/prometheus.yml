# Prometheus 配置文件 — HelloHebut 智能客服系统

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hellohebut'
    environment: 'production'

rule_files:
  - "alerts/*.yml"

scrape_configs:
  # HelloHebut 主应用指标
  - job_name: 'hellohebut-app'
    static_configs:
      - targets: ['hellohebut:8000']
        labels:
          service: 'hellohebut'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
